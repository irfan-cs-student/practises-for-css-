<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #dad2d2;
            font-family: sans-serif;
        }

        .social-links {
            display: flex;
            gap: 40px;
            padding-top: 40px;
            justify-content: center;
            align-items: center;
        }

        .social-links a {
            text-decoration: none;
            font-size: 28px;
            background-color: azure;
            padding: 20px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            opacity: 0.8;
            background-color: #f6df16;
        }

        .fb { color: #1750cb; }
        .yt { color: #ff0000; }
        .google { color: #1a680e; }
        .insta { color: #e1306c; }
        .whatsapp { color: #25d366; }
    </style>
</head>
<body>
    <h3>        -----use of icons--    </h3>

    <div class="social-links">
        <a href="https://facebook.com" class="fb"><i class="fa-brands fa-facebook"></i></a>
        <a href="https://youtube.com" class="yt"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://google.com" class="google"><i class="fa-brands fa-google"></i></a>
        <a href="https://instagram.com" class="insta"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://whatsapp.com" class="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

</body>
</html>
